name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency policy:
#   - For PR runs, cancel earlier in-flight runs on the same branch when a
#     new commit lands. Saves CI minutes during iterative review; the only
#     run that matters is the latest.
#   - For PUSH runs (i.e. main), DO NOT cancel. Every commit on main is a
#     point that someone may bisect or roll back to, so every commit needs
#     its own validated typecheck + migration smoke. Cancellation here was
#     the root cause of commit 4b2f6e0 shipping a self-referential ERR_*
#     bug that typecheck would have caught — the run got cancelled when
#     the immediate follow-up commit landed before CI completed.
#
# `${{ github.event_name == 'pull_request' }}` evaluates to the literal
# string "true"/"false", which `cancel-in-progress` accepts directly.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Design check + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        # The web + api packages import from @prequest/shared at runtime, so
        # we need the compiled dist/ before any typecheck.
        run: pnpm --filter @prequest/shared run build

      - name: Install ripgrep
        # scripts/check-b2-config-reads.sh and scripts/check-naming-allowlist.sh
        # shell out to `rg`. ripgrep is NOT preinstalled on the GitHub-hosted
        # ubuntu runner image. Those scripts run `set -uo pipefail` WITHOUT
        # `set -e`, so a missing `rg` does not abort — it silently yields an
        # empty snapshot, which makes the allowlist diff report the ENTIRE
        # allowlist as removed and the gate fails with a spurious all-`-`
        # diff (this masked two further pre-existing failures for a long
        # time). Installing rg makes the snapshot real; the scripts also now
        # hard-fail loudly if rg is absent (defense in depth). Must run
        # before the first rg-dependent step (B.2 config-reads).
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Design check (fonts, motion, format helpers, widths)
        run: pnpm design:check

      - name: B.2 config-reads check (allowlist diff)
        # Per docs/follow-ups/b2-survey-and-design.md §0.3: snapshot-
        # allowlist diff. New raw reads of workflow_definition_id /
        # sla_policy_id / case_sla_policy_id in B.2-scope modules
        # require either a fix or an allowlist update + triage entry
        # in docs/follow-ups/b2-config-reads-triage.md.
        run: pnpm b2:check-config-reads

      - name: Phase 7 AppError ratchet
        # Per docs/follow-ups/phase-7-implementation-plan.md §7.A.3.
        # Once a module has been migrated to AppError factories, raw
        # `throw new <Nest>Exception(...)` is a regression. The script
        # lists migrated modules; adding to that list is a one-way
        # ratchet enforced going forward.
        run: pnpm errors:check-app-errors

      - name: Phase 8 naming-allowlist drift gate
        # Per docs/follow-ups/phase-8-naming-audit.md (api scope, 8.A.2.6)
        # + docs/follow-ups/phase-8-frontend-rename-triage.md (web scope, 8.B.3).
        # Greps for legacy `booking_bundle*` / `bundle_id` /
        # `reservation_id` / bare `reservations` refs in BOTH apps/api/src and
        # apps/web/src + packages/shared/src, and asserts every match is on
        # its scope's pinned allowlist (apps/api/src/.naming-allowlist.txt or
        # apps/web/src/.naming-allowlist.txt). New refs require either a
        # rename (preferred) or an allowlist entry classified as
        # KEEP_HISTORICAL_COMMENT / KEEP_LEGITIMATE_OTHER_TABLE /
        # KEEP_BACKWARDS_COMPAT_FIELD / KEEP_AUDIT_ENTITY_TYPE / KEEP_WIRE_SHAPE.
        run: pnpm naming:check-allowlist

      - name: Typecheck web
        run: pnpm --filter @prequest/web run lint

      - name: Typecheck api
        run: pnpm --filter @prequest/api run lint

  migration-smoke:
    name: Migration smoke (db:reset + invariants)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Why this job exists: the 2026-04-30 destructive cutover lost 961 rows
    # because a `pg_get_constraintdef like '%public.tickets%'` loop in a DDL
    # migration silently failed to drop the CASCADE FKs it claimed to. CI
    # had no migration assertion to catch it. This job applies every
    # migration to a fresh database, then runs scripts/ci-migration-asserts.sql
    # which verifies the invariants (no CASCADE FKs to tickets, polymorphic
    # FKs intact, tenant_id present everywhere, canonical visibility/permission
    # functions exist, etc.). Any future migration that re-introduces the bug
    # class fails this gate before merge.
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.54.11

      - name: Boot Supabase local stack
        run: supabase start

      - name: Apply all migrations (db:reset)
        # `db:reset` drops the local DB and re-runs every file in
        # supabase/migrations/ in lex order. If any migration fails to apply
        # cleanly (return-type changes via CREATE OR REPLACE, missing
        # prerequisites, syntax errors, etc.), this step exits non-zero.
        run: supabase db reset

      - name: Run schema-integrity assertions
        env:
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -p 54322 -U postgres -d postgres \
            -v ON_ERROR_STOP=1 \
            -f scripts/ci-migration-asserts.sql

      - name: Stop Supabase stack
        if: always()
        run: supabase stop --no-backup

  concurrency-harness:
    name: B.0 concurrency harness (advisory-lock RPCs)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Why this job exists: B.0 introduced four advisory-lock-protected
    # RPCs (create_booking_with_attach_plan, grant_booking_approval,
    # approve_booking_setup_trigger, create_setup_work_order_from_event).
    # Mocked-jest specs cover happy paths + error mapping but cannot
    # simulate Postgres-level lock acquisition order, commit timing, or
    # for-update row-lock behaviour across two real connections. The
    # harness at apps/api/test/concurrency/ spins up two pg.Pool clients,
    # holds the advisory lock on one, asserts via pg_locks that the
    # second is blocked, releases the first, and asserts the second
    # proceeds with the spec-required outcome.
    #
    # Path filter: only runs on PRs that touch the four RPCs, the outbox
    # foundation, or the modules that call them. Push events on main
    # always run (the gate must verify every commit on main).
    #
    # Spec ref: docs/follow-ups/b0-real-db-concurrency-harness.md;
    # docs/superpowers/specs/2026-05-04-domain-outbox-design.md §15.5/§15.6.
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          # On `push` events the action evaluates against the previous
          # commit, so main pushes always trigger when one of the
          # filtered files changed in the diff. On PRs it diffs against
          # the base branch.
          filters: |
            b0:
              - 'apps/api/src/modules/outbox/**'
              - 'apps/api/src/modules/reservations/**'
              - 'apps/api/src/modules/booking-bundles/**'
              - 'apps/api/src/modules/approval/**'
              - 'apps/api/test/concurrency/**'
              - 'supabase/migrations/00299*'
              - 'supabase/migrations/0030[0-9]*'
              - 'supabase/migrations/0031[0-5]*'
              - '.github/workflows/ci.yml'

      - uses: pnpm/action-setup@v4
        if: steps.changes.outputs.b0 == 'true'
        with:
          version: 10.33.0
          run_install: false

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.b0 == 'true'
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.changes.outputs.b0 == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        if: steps.changes.outputs.b0 == 'true'
        run: pnpm --filter @prequest/shared run build

      - uses: supabase/setup-cli@v1
        if: steps.changes.outputs.b0 == 'true'
        with:
          version: 2.54.11

      - name: Boot Supabase local stack
        if: steps.changes.outputs.b0 == 'true'
        run: supabase start

      - name: Apply all migrations
        if: steps.changes.outputs.b0 == 'true'
        run: supabase db reset

      - name: Run concurrency harness
        if: steps.changes.outputs.b0 == 'true'
        env:
          SUPABASE_DB_HOST: 127.0.0.1
          SUPABASE_DB_PORT: '54322'
          SUPABASE_DB_USER: postgres
          SUPABASE_DB_PASSWORD: postgres
          SUPABASE_DB_NAME: postgres
        run: pnpm test:concurrency

      - name: Stop Supabase stack
        if: always() && steps.changes.outputs.b0 == 'true'
        run: supabase stop --no-backup
